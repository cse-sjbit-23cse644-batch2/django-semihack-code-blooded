{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white py-4 text-center">
                <i class="bi bi-box-arrow-in-right fs-2 mb-2 d-block"></i>
                <h3 class="fw-bold mb-0">Participant Login</h3>
                <p class="mb-0 opacity-75 small">Access your certificate & QR code</p>
            </div>
            <div class="card-body p-4">
                
                {% if error %}
                <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>{{ error }}</div>
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="student_id" class="form-label fw-semibold">Student ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-card-heading text-primary"></i></span>
                            <input type="text" class="form-control" id="student_id" name="student_id" placeholder="e.g. 100123" required/>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-envelope text-primary"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="e.g. jane@example.com" required/>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Haven't registered yet?</p>
                    <a href="{% url 'register' %}" class="btn btn-link text-decoration-none fw-semibold">Register Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
