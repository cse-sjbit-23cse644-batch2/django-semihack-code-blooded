{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white py-4 text-center">
                <i class="bi bi-shield-lock fs-2 mb-2 d-block"></i>
                <h3 class="fw-bold mb-0">Admin Login</h3>
                <p class="mb-0 opacity-75 small">Administrative capabilities dashboard access</p>
            </div>
            <div class="card-body p-4">
                
                {% if error %}
                <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>{{ error }}</div>
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-person-fill text-dark"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Admin username" required/>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-dark"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required/>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg fw-bold shadow">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Authenticate
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Looking for participant access?</p>
                    <a href="{% url 'login' %}" class="btn btn-link text-decoration-none fw-semibold text-dark">Student Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
